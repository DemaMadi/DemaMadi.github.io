<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="utf-8">
<title>دائرة المياه والصرف الصحي - بلدية سلفيت</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
}

#map{
    width:100%;
    height:100%;
}

.leaflet-control-layers{
    max-height:400px;
    overflow:auto;
}

/* مفتاح الخريطة */
.legend{
    background:white;
    padding:10px;
    border-radius:6px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    line-height:22px;
    direction:rtl;
    font-family:Arial;
    font-size:13px;
}

.legend h4{
    margin:0 0 8px 0;
    text-align:center;
}

.legend div{
    margin-bottom:5px;
}

.legend span{
    width:18px;
    height:18px;
    display:inline-block;
    margin-left:8px;
    border:1px solid #999;
    vertical-align:middle;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>

// إنشاء الخريطة
const map = L.map('map',{
    center:[32.0836,35.1805],
    zoom:15.4
});

// صورة فضائية
L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
    attribution:'Esri World Imagery'
}
).addTo(map);

// مقياس الرسم
L.control.scale({
    metric:true,
    imperial:false
}).addTo(map);

// =====================
// إنشاء الطبقات
// =====================

const boundaryLayer = L.layerGroup();
const blocksLayer = L.layerGroup();
const roadsLayer = L.layerGroup();
const manahilLayer = L.layerGroup();
const sewerageLayer = L.layerGroup();
const sewerLinesLayer = L.layerGroup();
const wateridsLayer = L.layerGroup();
const waterMeterLayer = L.layerGroup();

// =====================
// Boundary
// =====================

$.getJSON("boundary.json", function(data){

    L.geoJSON(data,{
        style:{
            color:"#000000",
            weight:3,
            fillOpacity:0
        }
    }).addTo(boundaryLayer);

});

// =====================
// Blocks
// =====================

$.getJSON("blocks.json", function(data){

    L.geoJSON(data,{
        style:{
            color:"#777777",
            weight:1,
            fillColor:"#d9d9d9",
            fillOpacity:0.4
        }
    }).addTo(blocksLayer);

});

// =====================
// Roads
// =====================

$.getJSON("RoadS.json", function(data){

    L.geoJSON(data,{
        style:{
            color:"#ffffff",
            weight:2
        }
    }).addTo(roadsLayer);

});

// =====================
// Manahil
// =====================

$.getJSON("Manahil.json", function(data){

    L.geoJSON(data,{
        pointToLayer:function(feature,latlng){
            return L.circleMarker(latlng,{
                radius:5,
                color:"#000",
                fillColor:"#ff0000",
                fillOpacity:1,
                weight:1
            });
        }
    }).addTo(manahilLayer);

});

// =====================
// Sewerage Agreements
// =====================

$.getJSON("SewerageAgreements.json", function(data){

    L.geoJSON(data,{
        style:{
            color:"#800080",
            weight:2
        }
    }).addTo(sewerageLayer);

});

// =====================
// Sewer Lines
// =====================

$.getJSON("sewerLines.json", function(data){

    L.geoJSON(data,{
        style:{
            color:"#ff6600",
            weight:2
        }
    }).addTo(sewerLinesLayer);

});

// =====================
// Water IDs
// =====================

$.getJSON("Waterids.json", function(data){

    L.geoJSON(data,{
        style:{
            color:"#0080ff",
            weight:2
        }
    }).addTo(wateridsLayer);

});

// =====================
// Water Meters
// =====================

$.getJSON("WaterMeterSalfeet.json", function(data){

    L.geoJSON(data,{
        pointToLayer:function(feature,latlng){
            return L.circleMarker(latlng,{
                radius:4,
                color:"#ffffff",
                fillColor:"#0000ff",
                fillOpacity:1,
                weight:1
            });
        }
    }).addTo(waterMeterLayer);

});

// =====================
// إضافة الطبقات الافتراضية
// =====================

boundaryLayer.addTo(map);
roadsLayer.addTo(map);
blocksLayer.addTo(map);

// =====================
// قائمة الطبقات
// =====================

L.control.layers(null,{
    "حدود البلدية": boundaryLayer,
    "الأحواض": blocksLayer,
    "الطرق": roadsLayer,
    "المناهل": manahilLayer,
    "اتفاقيات الصرف الصحي": sewerageLayer,
    "خطوط الصرف الصحي": sewerLinesLayer,
    "خطوط المياه": wateridsLayer,
    "عدادات المياه": waterMeterLayer
},{
    collapsed:false
}).addTo(map);

// =====================
// مفتاح الخريطة Legend
// =====================

const legend = L.control({
    position:'bottomright'
});

legend.onAdd = function(){

    const div = L.DomUtil.create('div','legend');

    div.innerHTML = `
    <h4>مفتاح الخريطة</h4>

    <div><span style="background:#000000"></span> حدود البلدية</div>
    <div><span style="background:#d9d9d9"></span> الأحواض</div>
    <div><span style="background:#ffffff"></span> الطرق</div>
    <div><span style="background:#ff0000"></span> المناهل</div>
    <div><span style="background:#800080"></span> اتفاقيات الصرف الصحي</div>
    <div><span style="background:#ff6600"></span> خطوط الصرف الصحي</div>
    <div><span style="background:#0080ff"></span> خطوط المياه</div>
    <div><span style="background:#0000ff"></span> عدادات المياه</div>
    `;

    return div;
};

legend.addTo(map);

</script>

</body>
</html>
