<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Map with Legend and Layers</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
    }

    #map {
      width: 100%;
      height: 400px; /* يمكنك تعديل ارتفاع الخريطة حسب الحاجة */
    }

    #legend {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000; /* تأكد من أن الصورة تظهر فوق الخريطة */
      background-color: white;
      border: 1px solid #ccc;
      padding: 10px;
    }

    .legend-item {
      margin-bottom: 5px;
    }

    .legend-item img {
      vertical-align: middle;
      margin-right: 5px;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <div id="legend">
    <!-- قم بتعديل المسارات والأسماء حسب احتياجاتك -->
    <div class="legend-item"><img src="Green.png" alt="Fast Charging 24kW"> Fast Charging 24kW</div>
    <div class="legend-item"><img src="blue.png" alt="Fast Charging 50kW"> Fast Charging 50kW</div>
    <div class="legend-item"><img src="Red.png" alt="Regular Charging 11kW"> Regular Charging 11kW</div>
    <div class="legend-item"><img src="Gry.png" alt="Regular Charging 22kW"> Regular Charging 22kW</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  <script>
    // الكود الخاص بالخريطة
    var map = L.map('map').setView([51.505, -0.09], 13); // تعيين العرض والارتفاع الافتراضيين للخريطة

    // إضافة الخريطة من خريطة OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
    }).addTo(map);

    // أضف طبقات الرموز مع الأيقونات المخصصة
    var fastCharging24Layer = L.layerGroup();
    var fastCharging50Layer = L.layerGroup();
    var regularCharging11Layer = L.layerGroup();
    var regularCharging22Layer = L.layerGroup();

    // استيراد البيانات الجغرافية وإضافة الرموز لكل طبقة

    // تعريف عناصر الرموز
    var fastCharging24Icon = L.icon({
      iconUrl: 'Green.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
    });
    var fastCharging50Icon = L.icon({
      iconUrl: 'blue.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
    });
    var regularCharging11Icon = L.icon({
      iconUrl: 'Red.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
    });
    var regularCharging22Icon = L.icon({
      iconUrl: 'Gry.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
    });

    // استيراد البيانات الجغرافية وإضافة الرموز لكل طبقة

    // إضافة الطبقات إلى الخريطة
    fastCharging24Layer.addTo(map);
