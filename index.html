<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Map of Electric car charging stations in West Bank</title>
  <!-- Add Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" />
  <!-- Add Leaflet Locate CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.locatecontrol/dist/L.Control.Locate.min.css" />
  <!-- Add Leaflet Control Panel CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-panel/dist/leaflet-panel.min.css" />
  <!-- Add Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
  <!-- CSS -->
  <style>
    body {
      margin: 0px;
      height: 100%;
      width: 100%;
    }
    #map {
      position: absolute;
      width: 100%;
      top: 0px;
      bottom: 0;
    }
    .map-toggle {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
    }
    /* Style for the map icon */
    .map-icon {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background-color: #fff;
      padding: 5px;
      border-radius: 5px;
      box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.5);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Map container -->
  <div id="map"></div>
  <!-- Leaflet JavaScript -->
  <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>
  <!-- Leaflet Locate JavaScript -->
  <script src="https://unpkg.com/leaflet.locatecontrol/dist/L.Control.Locate.min.js"></script>
  <!-- Leaflet Control Panel JavaScript -->
  <script src="https://unpkg.com/leaflet-control-panel/dist/leaflet-panel.min.js"></script>
  <!-- jQuery -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <!-- JavaScript -->
  <script>
    const mapOptions = {
      zoomSnap: 0.5,
      center: [31.778081556189452, 35.23535263863638],
      zoom: 8,
    };
    const map = L.map("map", mapOptions);
    // Define base maps
    const baseMapOpenStreetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 20
    });
    const baseMapOpenTopoMap = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://opentopomap.org/about#verwendung">OpenTopoMap</a> contributors',
      maxZoom: 17
    });
    // Function to switch to OpenStreetMap
    function switchToOpenStreetMap() {
      map.eachLayer(layer => {
        map.removeLayer(layer);
      });
      baseMapOpenStreetMap.addTo(map);
    }
    // Function to switch to OpenTopoMap
    function switchToOpenTopoMap() {
      map.eachLayer(layer => {
        map.removeLayer(layer);
      });
      baseMapOpenTopoMap.addTo(map);
    }
    // Create the map icon
    const mapIcon = L.divIcon({
      className: 'map-icon',
      html: '<i class="fas fa-map-marked-alt"></i>',
    });
    // Add the map icon to the map
    L.marker([0, 0], {
      icon: mapIcon,
    }).addTo(map);
    // Define the map layers
    const mapLayers = {
      "OpenStreetMap": baseMapOpenStreetMap,
      "OpenTopoMap": baseMapOpenTopoMap,
    };
    // Create a panel for the map layers
    const layersPanel = L.control.panelLayers(mapLayers, {
      collapsed: true, // Initially collapsed
      position: 'topright', // Position of the layers panel
    }).addTo(map);
  </script>
</body>
</html>
