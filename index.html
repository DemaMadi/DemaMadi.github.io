<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="utf-8" />

  <!-- Give the page a title -->
  <title>Map of Electric car charging stations in West Bank </title>

  <!-- Add a link to the Leaflet CSS library so you can reference it for styling your map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" />

  <!-- All the CSS code goes inside the style tags below -->
  <style>
    /* style the body */
    body {
      margin: 0px;
      height: 100%;
      width: 100%;
    }

    /* style the map */
    #map {
      position: absolute;
      width: 100%;
      top: 0px;
      bottom: 0;
    }
  </style>
</head>

<body>
  <!-- the map -->
  <div id="map"></div>

  <!-- Add a link to the Leaflet JavaScript library so you can reference it for building your map -->
  <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>

  <!-- Add a link to the jQuery JavaScript library so you can leverage ajax methods to load your data -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

  <!-- All JavaScript goes inside the script tags below -->
  <script>
    // define map options
    const mapOptions = {
      zoomSnap: 0.5,  // this allows fractional zooming
      center: [31.778081556189452, 35.23535263863638], // center the map on the coordinates for Ramallah
      zoom: 33.5, // set the initial zoom
    };

    // define the map with the options above
    const map = L.map("map", mapOptions);

    // add a base map to the map
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 20
    }).addTo(map);

    // Define custom icons for each type of charging station
    const fastCharging24Icon = L.icon({
      iconUrl: 'Green.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
    });

    const fastCharging50Icon = L.icon({
      iconUrl: 'blue.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
    });

    const regularCharging11Icon = L.icon({
      iconUrl: 'Red.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
    });

    const regularCharging22Icon = L.icon({
      iconUrl: 'Gry.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
    });

    // Function to apply the correct icon based on the feature
    function onEachFeature(feature, layer, icon) {
      layer.setIcon(icon);
    }

     $.getJSON("GoverW.json", function(GW) {
      L.geoJson(GW, {
        style: function(feature) {
          return {
            fillColor: "",
            fillOpacity: 0.0,
            color: "black",
            weight: 1.0,
            opacity: 0.7
          };
        },
        onEachFeature: function(feature, layer) {
          layer.on('click', function(e) {
            alert("Governorate: " + feature.properties.NAME);
          });
        }
      }).addTo(map);
    });

    // Load GeoJSON data with custom icons
    $.getJSON("FastCharing24kw.json", function(data) {
      L.geoJson(data, {
        pointToLayer: function(feature, latlng) {
          return L.marker(latlng, { icon: fastCharging24Icon });
        }
      }).addTo(map);
    });

    $.getJSON("FastCharing50kw.json", function(data) {
      L.geoJson(data, {
        pointToLayer: function(feature, latlng) {
          return L.marker(latlng, { icon: fastCharging50Icon });
        }
      }).addTo(map);
    });

    $.getJSON("ReqularCharging11kw.json", function(data) {
      L.geoJson(data, {
        pointToLayer: function(feature, latlng) {
          return L.marker(latlng, { icon: regularCharging11Icon });
        }
      }).addTo(map);
    });

    $.getJSON("ReqularCharging22kw.json", function(data) {
      L.geoJson(data, {
        pointToLayer: function(feature, latlng) {
          return L.marker(latlng, { icon: regularCharging22Icon });
        }
      }).addTo(map);
    });

  </script>
</body>

</html>
