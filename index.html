<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Map of Electric car charging stations in West Bank</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.locatecontrol/dist/L.Control.Locate.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
  <style>
    body {
      margin: 0;
      height: 100%;
      width: 100%;
    }

    #map {
      position: absolute;
      width: 100%;
      top: 0;
      bottom: 0;
    }

    .legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background-color: white;
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      display: none; /* يكون مخفيًا افتراضيًا */
    }

    .legend-item {
      margin-bottom: 5px;
    }

    .legend-item img {
      vertical-align: middle;
      margin-right: 5px;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <!-- تفسير للطبقات -->
  <div class="legend">
    <div class="legend-item"><img src="Green.png" alt="Fast Charging 24kW"> Fast Charging 24kW</div>
    <div class="legend-item"><img src="blue.png" alt="Fast Charging 50kW"> Fast Charging 50kW</div>
    <div class="legend-item"><img src="Red.png" alt="Regular Charging 11kW"> Regular Charging 11kW</div>
    <div class="legend-item"><img src="Gry.png" alt="Regular Charging 22kW"> Regular Charging 22kW</div>
  </div>

  <!-- أيقونة لتبديل حالة عنصر التفسير -->
  <button id="toggleLegendBtn">
    <i class="fas fa-info-circle"></i> عرض/إخفاء التفسير
  </button>

  <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script>
    // تعريف الدالة لتبديل حالة عنصر التفسير
    function toggleLegend() {
      $(".legend").toggle(); // تبديل حالة العرض بين الظهور والإخفاء
    }

    // ربط الدالة بالزر (الأيقونة) لتبديل حالة عنصر التفسير عند الضغط عليه
    $("#toggleLegendBtn").click(function() {
      toggleLegend(); // استدعاء الدالة عند النقر
    });
  </script>
</body>
</html>
