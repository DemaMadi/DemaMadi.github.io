<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Map of Electric car charging stations in West Bank</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.locatecontrol/dist/L.Control.Locate.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
  <style>
    body {
      margin: 0;
      height: 100%;
      width: 100%;
    }

    #map {
      position: absolute;
      width: 100%;
      top: 0;
      bottom: 0;
    }

    .legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background-color: white;
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .legend-item {
      margin-bottom: 5px;
    }

    .legend-item img {
      vertical-align: middle;
      margin-right: 5px;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <!-- تفسير للطبقات -->
  <div class="legend">
    <div class="legend-item"><img src="Green.png" alt="Fast Charging 24kW"> Fast Charging 24kW</div>
    <div class="legend-item"><img src="blue.png" alt="Fast Charging 50kW"> Fast Charging 50kW</div>
    <div class="legend-item"><img src="Red.png" alt="Regular Charging 11kW"> Regular Charging 11kW</div>
    <div class="legend-item"><img src="Gry.png" alt="Regular Charging 22kW"> Regular Charging 22kW</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script>
    const mapOptions = {
      zoomSnap: 0.5,
      center: [31.778081556189452, 35.23535263863638],
      zoom: 8,
    };

    const map = L.map("map", mapOptions);

    const baseMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 20
    }).addTo(map);

    L.control.scale({
      position: 'bottomright',
      metric: true,
      imperial: false
    }).addTo(map);

    const fastCharging24Icon = L.icon({
      iconUrl: 'Green.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
    });

    const fastCharging50Icon = L.icon({
      iconUrl: 'blue.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
    });

    const regularCharging11Icon = L.icon({
      iconUrl: 'Red.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
    });

    const regularCharging22Icon = L.icon({
      iconUrl: 'Gry.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
    });

    const fastCharging24Layer = L.layerGroup();
    const fastCharging50Layer = L.layerGroup();
    const regularCharging11Layer = L.layerGroup();
    const regularCharging22Layer = L.layerGroup();

    $.getJSON("GoverW.json", function(GW) {
      const goverLayer = L.geoJson(GW, {
        style: function(feature) {
          return {
            fillColor: "",
            fillOpacity: 0.0,
            color: "black",
            weight: 1.5,
            opacity: 0.7
          };
        },
        onEachFeature: function(feature, layer) {
          layer.on('click', function(e) {
            alert("Governorate: " + feature.properties.Name);
          });
        }
      }).addTo(map);

      map.fitBounds(goverLayer.getBounds());
    });

    $.getJSON("FastCharing24kw.json", function(data) {
      L.geoJson(data, {
        pointToLayer: function(feature, latlng) {
          return L.marker(latlng, { icon: fastCharging24Icon });
        }
      }).addTo(fastCharging24Layer);
    });

    $.getJSON("FastCharing50kw.json", function(data) {
      L.geoJson(data, {
        pointToLayer: function(feature, latlng) {
          return L.marker(latlng, { icon: fastCharging50Icon });
        }
      }).addTo(fastCharging50Layer);
    });

    $.getJSON("ReqularCharging11kw.json", function(data) {
      L.geoJson(data, {
        pointToLayer: function(feature, latlng) {
          return L.marker(latlng, { icon: regularCharging11Icon });
        }
      }).addTo(regularCharging11Layer);
    });

    $.getJSON("ReqularCharging22kw.json", function(data) {
      L.geoJson(data, {
        pointToLayer: function(feature, latlng) {
          return L.marker(latlng, { icon: regularCharging22Icon });
        }
      }).addTo(regularCharging22Layer);
    });

    fastCharging24Layer.addTo(map);
    fastCharging50Layer.addTo(map);
    regularCharging11Layer.addTo(map);
    regularCharging22Layer.addTo(map);

    const overlayMaps = {
      "Fast Charging 24kW": fastCharging24Layer,
      "Fast Charging 50kW": fastCharging50Layer,
      "Regular Charging 11kW": regularCharging11Layer,
      "Regular Charging 22kW": regularCharging22Layer
    };

    L.control.layers(null, overlayMaps, { position: 'topleft' }).addTo(map);

    L.control.locate({
      position: 'topleft',
      drawCircle: false,
      follow: true,
      setView: true,
      keepCurrentZoom
// تابع الزووم المستمر مع تحديد الموقع
      markerStyle: {
        weight: 1,
        opacity: 0.8,
        fillOpacity: 0.8
      },
      icon: 'fa fa-location-arrow',
      metric: true,
      strings: {
        title: "Show location ",
        popup: "You are within {distance} {unit} from this point",
        outsideMapBoundsMsg: "You seem located outside the boundaries of the map"
      },
      locateOptions: {
        maxZoom: 15,
        initialZoomLevel: 15, // Set the initial zoom level
        enableHighAccuracy: true,
        maximumAge: 10000,
        timeout: 10000
      }
    }).addTo(map);

    // إضافة عنصر التفسير للخريطة
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function (map) {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML += '<div class="legend-item"><img src="Green.png" alt="Fast Charging 24kW"> Fast Charging 24kW</div>';
      div.innerHTML += '<div class="legend-item"><img src="blue.png" alt="Fast Charging 50kW"> Fast Charging 50kW</div>';
      div.innerHTML += '<div class="legend-item"><img src="Red.png" alt="Regular Charging 11kW"> Regular Charging 11kW</div>';
      div.innerHTML += '<div class="legend-item"><img src="Gry.png" alt="Regular Charging 22kW"> Regular Charging 22kW</div>';
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
