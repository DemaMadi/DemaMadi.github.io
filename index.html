<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Ramallah Libraries</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" />
  <style>
    body {
      margin: 0px;
      height: 100%;
      width: 100%;
    }
    #map {
      position: absolute;
      width: 100%;
      top: 0px;
      bottom: 100px; 
    }
    #legend {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background-color: rgba(255, 255, 255, 0.8);
      padding: 10px;
      border-radius: 5px;
    }
    .legend-item {
      margin-bottom: 5px;
    }
    #search-box {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background-color: white;
      padding: 5px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }
    .leaflet-control-container .leaflet-bottom.leaflet-right {
      margin: 10px;
    }
  </style>
</head>
<body>
  <h1 style="text-align: center;">Ramallah Libraries Map</h1>
  <div id="map"></div>
  <div id="legend">
    <h3>Legend</h3>
    <div class="legend-item"><span class="zone-color" style="background-color: blue;"></span> Zones with Libraries</div>
    <div class="legend-item"><span class="library-color" style="background-color: green;"></span> Libraries</div>
  </div>
  <div id="search-box">
    <input type="text" id="search-input" placeholder="Search for libraries">
    <button onclick="searchLibraries()">Search</button>
  </div>
  <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script>
    const mapOptions = {
      zoomSnap: 0.5,
      center: [31.904894089545376, 35.20119879542709],
      zoom: 12.5,
      dragging: true,
      touchZoom: true,
      scrollWheelZoom: true,
      doubleClickZoom: true,
      boxZoom: true,
      keyboard: true,
      zoomControl: true
    };
    const map = L.map("map", mapOptions);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: 'Map data &copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors'
    }).addTo(map);
    L.control.scale().addTo(map);
    const librariesLayer = L.layerGroup().addTo(map);
    $.getJSON("RamallahZones.json", function(RZ) {
      L.geoJson(RZ, {
        style: function(feature) {
          return {
            fillColor: "",
            fillOpacity: 0.0,
            color: "blue",
            weight: 1.0,
            opacity: 0.7
          };
        },
        onEachFeature: function(feature, layer) {
          layer.on('click', function(e) {
            alert("Zone: " + feature.properties.NAME_ENGLI + "\nMAIL_CODE: " + feature.properties.MAIL_CODE);
          });
        }
      }).addTo(map);
    });
    function onLibraryClick(e) {
      alert("Library: " + e.target.feature.properties.BUSINESS_1);
    }
    function onEachLibraryFeature(feature, layer) {
      if (feature.properties && feature.properties.BUSINESS_1) {
        layer.bindPopup(feature.properties.BUSINESS_1);
      }
      layer.on('click', onLibraryClick);
    }
    $.getJSON("Libraries_P.json", function(LP) {
      L.geoJson(LP, {
        pointToLayer: function(feature, latlng) {
          return L.marker(latlng);
        },
        onEachFeature: onEachLibraryFeature
      }).addTo(librariesLayer);
    });
    function searchLibraries() {
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      librariesLayer.eachLayer(function(layer) {
        const name = layer.feature.properties.BUSINESS_1.toLowerCase();
        if (name.includes(searchTerm)) {
          layer.addTo(map);
        } else {
          layer.removeFrom(map);
        }
      });
    }
    // Show user's location
    map.locate({setView: true, maxZoom: 16});
    function onLocationFound(e) {
      // Create a custom icon for user's location
      const customIcon = L.divIcon({
        className: 'custom-div-icon',
        html: "<div style='background-color:#007bff;width:20px;height:20px;border-radius:50%;'></div>"
      });
      L.marker(e.latlng, {icon: customIcon}).addTo(map);
    }
    map.on('locationfound', onLocationFound);
    // Clean up the map and show map control when clicking on the library layer
    librariesLayer.on('click', function () {
      map.eachLayer(function (layer) {
        if (layer !== librariesLayer) {
          map.removeLayer(layer);
        }
      });
      L.control.layers().addTo(map);
    });
  </script>
</body>
</html>
