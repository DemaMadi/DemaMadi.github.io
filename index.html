<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Map of Electric car charging stations in West Bank</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.locatecontrol/dist/L.Control.Locate.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
  <style>
    body {
      margin: 0px;
      height: 100%;
      width: 100%;
    }

    #map {
      position: absolute;
      width: 100%;
      top: 0px;
      bottom: 0;
    }

    .map-toggle {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
    }

    .nav-arrows {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .arrow {
      background-color: rgba(255, 255, 255, 0.7);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .arrow:hover {
      background-color: rgba(255, 255, 255, 0.9);
    }

    .left-arrow {
      margin-right: auto;
    }

    .right-arrow {
      margin-left: auto;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="map-toggle">
    <button onclick="switchToOpenStreetMap()">OpenStreetMap</button>
    <button onclick="switchToOpenTopoMap()">OpenTopoMap</button>
  </div>
  <div class="nav-arrows">
    <button class="arrow left-arrow" onclick="panMap('left')">
      <i class="fas fa-arrow-left"></i>
    </button>
    <button class="arrow right-arrow" onclick="panMap('right')">
      <i class="fas fa-arrow-right"></i>
    </button>
  </div>
  <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.locatecontrol/dist/L.Control.Locate.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script>
    const mapOptions = {
      zoomSnap: 0.5,
      center: [31.778081556189452, 35.23535263863638],
      zoom: 8,
    };

    const map = L.map("map", mapOptions);

    const baseMapOpenStreetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 20
    });

    const baseMapOpenTopoMap = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://opentopomap.org/about#verwendung">OpenTopoMap</a> contributors',
      maxZoom: 17
    });

    function switchToOpenStreetMap() {
      baseMapOpenStreetMap.addTo(map);
      baseMapOpenTopoMap.remove();
    }

    function switchToOpenTopoMap() {
      baseMapOpenTopoMap.addTo(map);
      baseMapOpenStreetMap.remove();
    }

    function panMap(direction) {
      const mapCenter = map.getCenter();
      let newCenter;
      if (direction === 'left') {
        newCenter = L.latLng(mapCenter.lat, mapCenter.lng - 0.1);
      } else if (direction === 'right') {
        newCenter = L.latLng(mapCenter.lat, mapCenter.lng + 0.1);
      }
      map.panTo(newCenter);
    }

    L.control.scale({
      position: 'bottomright',
      metric: true,
      imperial: false
    }).addTo(map);

    const fastCharging24Icon = L.icon({
      iconUrl: 'Green.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
    });

    const fastCharging50Icon = L.icon({
      iconUrl: 'blue.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
    });

    const regularCharging11Icon = L.icon({
      iconUrl: 'Red.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
    });

    const regularCharging22Icon = L.icon({
      iconUrl: 'Gry.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
    });

    const fastCharging24Layer = L.layerGroup();
    const fastCharging50Layer = L.layerGroup();
    const regularCharging11Layer = L.layerGroup();
    const regularCharging22Layer = L.layerGroup();

    $.getJSON("GoverW.json", function(GW) {
      const goverLayer = L.geoJson(GW, {
        style: function(feature) {
          return {
            fillColor: "",
            fillOpacity: 0.0,
            color: "black",
            weight: 1.5,
            opacity: 0.7
          };
        },
        onEachFeature: function(feature, layer) {
          layer.on('click', function(e) {
            alert("Governorate: " + feature.properties.Name);
          });
        }
      }).addTo(map);

      map.fitBounds(goverLayer.getBounds());
    });

    $.getJSON("FastCharing24kw.json", function(data) {
      L.geoJson(data, {
        pointToLayer: function(feature, latlng) {
          return L.marker(latlng, { icon: fastCharging24Icon });
        }
      }).addTo(fastCharging24Layer);
    });

    $.getJSON("FastCharing50kw.json", function(data) {
      L.geoJson(data, {
        pointToLayer: function(feature, latlng) {
          return L.marker(latlng, { icon: fastCharging50Icon });
        }
      }).addTo(fastCharging50Layer);
    });

    $.getJSON("ReqularCharging11kw.json", function(data) {
      L.geoJson(data, {
        pointToLayer: function(feature, latlng) {
          return L.marker(latlng, { icon: regularCharging11Icon });
        }
      }).addTo(regularCharging11Layer);
    });

    $.getJSON("ReqularCharging22kw.json", function(data) {
      L.geoJson(data, {
        pointToLayer: function(feature, latlng) {
          return L.marker(latlng, { icon: regularCharging22Icon });
        }
      }).addTo(regularCharging22Layer);
    });

    fastCharging24Layer.addTo(map);
    fastCharging50Layer.addTo(map);
    regularCharging11Layer.addTo(map);
    regularCharging22Layer.addTo(map);

    const overlayMaps = {
      "Fast Charging 24kW": fastCharging24Layer,
      "Fast Charging 50kW": fastCharging50Layer,
      "Regular Charging 11kW": regularCharging11Layer,
      "Regular Charging 22kW": regularCharging22Layer
    };

    L.control.layers(null, overlayMaps, { position: 'topleft' }).addTo(map);

    L.control.locate({
      position: 'topleft',
      drawCircle: false,
      follow: true,
      setView: true,
      keepCurrentZoomLevel: false,
      markerStyle: {
        weight: 1,
        opacity: 0.8,
        fillOpacity: 0.8
      },
      icon: 'fa fa-location-arrow',
      metric: true,
      strings: {
        title: "Show location ",
        popup: "You are within {distance} {unit} from this point",
        outsideMapBoundsMsg: "You seem located outside the boundaries of the map"
      },
      locateOptions: {
        maxZoom: 15,
        initialZoomLevel: 15,
        enableHighAccuracy: true,
        maximumAge: 10000,
        timeout: 10000
      }
    }).addTo(map);
  </script>
</body>
</html>
